name: Refresh sports data

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/**
      - .github/workflows/refresh.yml

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetchers
        run: |
          set +e
          python scripts/fetch_f1.py
          python scripts/fetch_intl_rugby.py
          python scripts/fetch_provinces.py
          python scripts/fetch_schools.py
          python scripts/fetch_dublin_club.py
          python scripts/fetch_news.py
          exit 0

      - name: Validate links (warn-only)
        run: |
          # Warn-only: never fails the data refresh, but surfaces broken
          # YouTube handles in the run log so we notice early.
          python scripts/validate_links.py || echo "::warning::validate_links.py reported broken link(s) — see log."

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry push with rebase to handle races with other commits.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push failed, attempt $i — pulling with rebase (preferring our fresh data) and retrying"
            # -X theirs: when rebasing OUR commit on top of remote, "theirs" = our changes, win the conflict.
            git pull --rebase -X theirs origin main || git rebase --abort
            sleep 3
          done
          echo "::error::Failed to push refreshed data after retries"
          exit 1
